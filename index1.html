<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supabase Attendance Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CSS for style -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; }
    .login-container, .dashboard-container { max-width: 400px; margin: 60px auto; }
    .card { border-radius: 1.2rem; box-shadow: 0 3px 20px rgba(0,0,0,0.07); }
  </style>
</head>
<body>
<div class="container">
  <!-- Login Form -->
  <div class="login-container" id="login-section">
    <div class="card p-4">
      <h3 class="mb-3 text-center">Employee Login (Supabase)</h3>
      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">User Name</label>
          <input type="text" class="form-control" id="username" required>
        </div>
        <div class="mb-3">
          <label for="userPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="userPassword" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div id="loginError" class="text-danger mt-2 d-none"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard-container d-none" id="dashboard-section">
    <div class="card p-4">
      <div class="mb-3 text-center">
        <h4 id="employeeName"></h4>
        <div class="text-muted" id="employeeLocation"></div>
      </div>
      <p class="text-success text-center">Login successful!</p>
    </div>
  </div>
</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  // Replace with your actual Supabase project URL and anon key!
  const SUPABASE_URL = 'https://dfepjaivpgomxsjbxnhz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZXBqYWl2cGdvbXhzamJ4bmh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk4MjY0NTMsImV4cCI6MjA2NTQwMjQ1M30.5ASDRBIH0CQ-4d2_1g8hfsZlotOp1EbU9v9nZXZdRIM';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginSection = document.getElementById('login-section');
  const dashboardSection = document.getElementById('dashboard-section');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const employeeName = document.getElementById('employeeName');
  const employeeLocation = document.getElementById('employeeLocation');

  loginForm.onsubmit = async function(e) {
    e.preventDefault();
    loginError.classList.add('d-none');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('userPassword').value;

    // Query Supabase users table for matching username and password
    // (For production: passwords should be hashed and checked securely!)
    const { data, error } = await supabase
      .from('users')
      .select('*')
      .eq('username', username)
      .eq('password', password) // In production, NEVER do this! Use hashed password check on a backend!
      .single();

    if (error || !data) {
      loginError.textContent = "Invalid username or password.";
      loginError.classList.remove('d-none');
      return;
    }

    // Success
    employeeName.textContent = data.name;
    employeeLocation.textContent = data.location;
    loginSection.classList.add('d-none');
    dashboardSection.classList.remove('d-none');
  }
</script>
</body>
</html>
